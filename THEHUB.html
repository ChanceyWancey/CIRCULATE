<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remorse's Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080a0f;--surface:#0d1117;--border:#1c2333;--ink:#e8eaf0;--ink2:#6b7385;--ink3:#3a404f;}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);opacity:.4;}
.blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;animation:blobDrift 14s ease-in-out infinite alternate;}
.blob-1{width:600px;height:500px;top:-100px;left:-150px;background:radial-gradient(circle,#1a2a6c44,transparent 70%);}
.blob-2{width:500px;height:400px;bottom:-80px;right:-100px;background:radial-gradient(circle,#4f8ef722,transparent 70%);animation-delay:-7s;}
.blob-3{width:350px;height:300px;top:40%;left:60%;background:radial-gradient(circle,#f7c94f11,transparent 70%);animation-delay:-3s;}
@keyframes blobDrift{from{transform:translate(0,0) scale(1);}to{transform:translate(30px,20px) scale(1.05);}}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:64px;}
header{text-align:center;}
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink2);margin-bottom:20px;display:flex;align-items:center;gap:12px;justify-content:center;}
.eyebrow::before,.eyebrow::after{content:'';display:block;width:40px;height:1px;background:var(--border);}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,14vw,140px);line-height:.9;letter-spacing:.02em;color:var(--ink);display:inline-block;}
.title span{display:block;background:linear-gradient(135deg,#e8eaf0 30%,#6b7385 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.title .sub{font-family:'DM Mono',monospace;font-size:13px;font-weight:400;letter-spacing:.18em;-webkit-text-fill-color:var(--ink2);color:var(--ink2);background:none;margin-top:12px;display:block;text-transform:uppercase;}
.games{display:flex;flex-direction:column;gap:16px;width:100%;max-width:560px;}
.game-card{display:block;text-decoration:none;border:1px solid var(--border);border-radius:10px;padding:28px 32px;background:var(--surface);position:relative;overflow:hidden;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;cursor:pointer;animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.game-card::before{content:'';position:absolute;inset:0;background:var(--card-glow,transparent);opacity:0;transition:opacity .3s;border-radius:inherit;}
.game-card:hover::before{opacity:1;}
.game-card:hover{transform:translateY(-3px);box-shadow:0 12px 48px rgba(0,0,0,.5);border-color:var(--card-border,var(--border));}
.game-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--card-color,#fff),transparent);opacity:0;transition:opacity .3s;}
.game-card:hover::after{opacity:1;}
.card-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;}
.card-left{flex:1;}
.card-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;display:block;color:var(--card-color,var(--ink2));}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:.04em;color:var(--ink);line-height:1;display:block;margin-bottom:6px;}
.card-desc{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink2);letter-spacing:.08em;line-height:1.6;text-transform:uppercase;}
.card-arrow{font-size:28px;flex-shrink:0;color:var(--card-color,var(--ink2));transition:transform .25s cubic-bezier(.22,1,.36,1);}
.game-card:hover .card-arrow{transform:translate(4px,-4px);}
.scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);pointer-events:none;border-radius:inherit;opacity:0;transition:opacity .3s;}
.game-card:hover .scanline{opacity:1;}
footer{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;gap:16px;}
footer::before,footer::after{content:'';display:block;width:32px;height:1px;background:var(--ink3);opacity:.4;}
.corner{position:fixed;width:48px;height:48px;pointer-events:none;z-index:2;}
.corner-tl{top:20px;left:20px;border-top:1px solid var(--border);border-left:1px solid var(--border);}
.corner-tr{top:20px;right:20px;border-top:1px solid var(--border);border-right:1px solid var(--border);}
.corner-bl{bottom:20px;left:20px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);}
.corner-br{bottom:20px;right:20px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.status{position:fixed;bottom:24px;right:24px;z-index:2;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;gap:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="status"><div class="status-dot"></div>remorse's games</div>

<div class="wrap">
  <header>
    <div class="eyebrow">game hub</div>
    <h1 class="title">
      <span>Remorse's</span>
      <span>Games</span>
      <span class="sub">select a game to play</span>
    </h1>
  </header>
  <nav class="games" id="gameList"></nav>
  <footer>Remorse's Games — 2026</footer>
</div>

<script>
// ╔══════════════════════════════════════════╗
// ║        ADD / EDIT GAMES HERE            ║
// ╠══════════════════════════════════════════╣
// ║  name  — the big title on the card      ║
// ║  tag   — small label (genre/status)     ║
// ║  desc  — one-liner description          ║
// ║  url   — where the button links to      ║
// ║  color — accent color (any hex)         ║
// ╚══════════════════════════════════════════╝

const GAMES = [
  {
    name:  'Circulate',
    tag:   'Arcade',
    desc:  'Flow & rhythm arcade game',
    url:   'https://chanceywancey.github.io/CIRCULATE/CIRCULATE.html',
    color: '#4f8ef7',
  },
  {
    name:  'Hold The Line',
    tag:   'Tower Defense',
    desc:  'Strategic tower defense — beta',
    url:   'https://chanceywancey.github.io/CIRCULATE/BETA.html',
    color: '#f74f4f',
  },

  // ── TO ADD A NEW GAME, copy the block below, uncomment it, and fill it in ──
  // {
  //   name:  'My New Game',
  //   tag:   'Genre',
  //   desc:  'Short description',
  //   url:   'https://link-to-your-game.html',
  //   color: '#a855f7',
  // },
];

// ── Don't touch anything below this line ──
const list = document.getElementById('gameList');
GAMES.forEach((g, i) => {
  const num = String(i + 1).padStart(2, '0');
  const a = document.createElement('a');
  a.className = 'game-card';
  a.href = g.url;
  a.target = '_blank';
  a.style.cssText = [
    `--card-color:${g.color}`,
    `--card-glow:linear-gradient(135deg,${g.color}08,transparent)`,
    `--card-border:${g.color}55`,
    `animation-delay:${0.1 + i * 0.1}s`,
  ].join(';');
  a.innerHTML = `
    <div class="scanline"></div>
    <div class="card-inner">
      <div class="card-left">
        <span class="card-num">${num} — ${g.tag}</span>
        <span class="card-name">${g.name}</span>
        <span class="card-desc">${g.desc}</span>
      </div>
      <span class="card-arrow">↗</span>
    </div>`;
  list.appendChild(a);
});
</script>
</body>
</html>
