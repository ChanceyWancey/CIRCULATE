<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>circulaet (the bad one)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0ede0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Comic Sans MS', cursive;
    }
    canvas {
      border: 3px solid #333;
      cursor: crosshair;
      box-shadow: 4px 4px 0 #bbb;
    }
    #info {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <canvas id="c" width="600" height="450"></canvas>
  <div id="info">WASD / arrows = move &nbsp;|&nbsp; mouse click = shoot &nbsp;|&nbsp; space = auto shoot</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    function wobblyFill(x, y, r, fill, stroke) {
      ctx.beginPath();
      const steps = 14;
      for (let i = 0; i <= steps; i++) {
        const a = (i / steps) * Math.PI * 2;
        const j = (Math.random() - 0.5) * 4;
        const rx = x + Math.cos(a) * (r + j);
        const ry = y + Math.sin(a) * (r + j);
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
      }
      ctx.closePath();
      ctx.fillStyle = fill || '#eee'; ctx.fill();
      ctx.strokeStyle = stroke || '#333'; ctx.lineWidth = 2.5; ctx.stroke();
    }

    function wobblyRect(x, y, w, h, fill, stroke) {
      ctx.beginPath();
      const j = () => (Math.random() - 0.5) * 3;
      ctx.moveTo(x + j(), y + j()); ctx.lineTo(x + w + j(), y + j());
      ctx.lineTo(x + w + j(), y + h + j()); ctx.lineTo(x + j(), y + h + j());
      ctx.closePath();
      ctx.fillStyle = fill || '#fff'; ctx.fill();
      ctx.strokeStyle = stroke || '#333'; ctx.lineWidth = 2; ctx.stroke();
    }

    function skewText(txt, x, y, size, color, angle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate((angle || 0) + (Math.random() - 0.5) * 0.04);
      ctx.font = `${size || 14}px "Comic Sans MS", cursive`;
      ctx.fillStyle = color || '#222';
      ctx.fillText(txt, 0, 0);
      ctx.restore();
    }

    const MSGS = ['got em!!', 'nice one', 'ok', 'YEET', 'lol', 'pew pew', 'bye!!', 'ouch', 'nice!!', 'rip'];

    let player, bullets, enemies, particles, floats;
    let score, wave, alive, started, waveTimer, waveActive, enemiesToSpawn, spawnTimer;
    let keys = {}, mx = W / 2, my = H / 2, shootTimer = 0;

    function restartGame() {
      player = { x: W / 2, y: H / 2, r: 14, hp: 5, maxHp: 5, speed: 2.5, angle: 0 };
      bullets = []; enemies = []; particles = []; floats = [];
      score = 0; wave = 0; alive = true;
      waveTimer = 120; waveActive = false; enemiesToSpawn = 0; spawnTimer = 0;
    }
    restartGame();

    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mx = e.clientX - r.left; my = e.clientY - r.top;
    });
    canvas.addEventListener('click', e => {
      const r = canvas.getBoundingClientRect();
      mx = e.clientX - r.left; my = e.clientY - r.top;
      if (!started || !alive) { started = true; restartGame(); return; }
      fireBullet();
    });
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      mx = e.changedTouches[0].clientX - r.left;
      my = e.changedTouches[0].clientY - r.top;
      if (!started || !alive) { started = true; restartGame(); return; }
      fireBullet();
    }, { passive: false });
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (!started) { started = true; restartGame(); }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function fireBullet() {
      const dx = mx - player.x, dy = my - player.y;
      const len = Math.hypot(dx, dy) || 1;
      bullets.push({ x: player.x, y: player.y, vx: dx / len * 7, vy: dy / len * 7, r: 5, alive: true });
    }

    const ENEMY_TYPES = [
      { label: 'bad guy',  r: 16, hp: 3, speed: 1.4, col: '#e74c3c', pts: 10 },
      { label: 'lil guy',  r: 10, hp: 1, speed: 2.2, col: '#e67e22', pts: 5  },
      { label: 'BIG GUY',  r: 24, hp: 8, speed: 0.7, col: '#8e44ad', pts: 25 },
      { label: 'spiky??',  r: 14, hp: 4, speed: 1.8, col: '#16a085', pts: 15 },
      { label: '??',       r: 12, hp: 2, speed: 2.0, col: '#c0392b', pts: 8  },
    ];

    function spawnEnemy() {
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = Math.random() * W; y = -30; }
      else if (side === 1) { x = W + 30; y = Math.random() * H; }
      else if (side === 2) { x = Math.random() * W; y = H + 30; }
      else { x = -30; y = Math.random() * H; }
      const pool = ENEMY_TYPES.slice(0, Math.min(ENEMY_TYPES.length, 1 + Math.floor(wave / 2)));
      const t = pool[Math.floor(Math.random() * pool.length)];
      enemies.push({ x, y, r: t.r, hp: t.hp, maxHp: t.hp, speed: t.speed, col: t.col, label: t.label, pts: t.pts, alive: true });
    }

    function spawnParticles(x, y, col, n) {
      for (let i = 0; i < (n || 6); i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 1 + Math.random() * 3;
        particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, col: col || '#e74c3c', r: 3 + Math.random() * 4 });
      }
    }

    function addFloat(txt, x, y, col) {
      floats.push({ txt, x, y, life: 1.5, col: col || '#333' });
    }

    function drawPaper() {
      ctx.fillStyle = '#fffef5';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#b8d4f0'; ctx.lineWidth = 1;
      for (let y = 30; y < H; y += 22) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      ctx.strokeStyle = '#f08080'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(65, 0); ctx.lineTo(65, H); ctx.stroke();
    }

    function drawTitle() {
      ctx.save(); ctx.textAlign = 'center';
      ctx.font = 'bold 42px "Comic Sans MS",cursive';
      ctx.fillStyle = '#2c3e50';
      ctx.save(); ctx.translate(W / 2, H / 2 - 90); ctx.rotate(-0.03);
      ctx.fillText('circulaet', 0, 0); ctx.restore();

      ctx.font = '16px "Comic Sans MS",cursive'; ctx.fillStyle = '#7f8c8d';
      ctx.save(); ctx.translate(W / 2, H / 2 - 58); ctx.rotate(0.015);
      ctx.fillText('(the bad one)', 0, 0); ctx.restore();

      ctx.font = '14px "Comic Sans MS",cursive'; ctx.fillStyle = '#555';
      ctx.fillText('click or press any key to start i guess', W / 2, H / 2 + 5);
      ctx.fillText('WASD = move  |  mouse click = shoot', W / 2, H / 2 + 28);
      ctx.fillText('space bar = hold to auto-fire', W / 2, H / 2 + 50);

      ctx.font = '11px "Comic Sans MS",cursive'; ctx.fillStyle = '#aaa';
      ctx.save(); ctx.translate(W / 2, H / 2 + 100); ctx.rotate(0.02);
      ctx.fillText('(i made this myself it took me so long)', 0, 0); ctx.restore();
      ctx.restore();
    }

    function drawDead() {
      ctx.save(); ctx.textAlign = 'center';
      ctx.font = 'bold 34px "Comic Sans MS",cursive'; ctx.fillStyle = '#c0392b';
      ctx.save(); ctx.translate(W / 2, H / 2 - 70); ctx.rotate(0.05);
      ctx.fillText('ur literally dead lol', 0, 0); ctx.restore();

      ctx.font = '17px "Comic Sans MS",cursive'; ctx.fillStyle = '#444';
      ctx.fillText(`score: ${score}`, W / 2, H / 2 - 20);

      ctx.font = '13px "Comic Sans MS",cursive'; ctx.fillStyle = '#888';
      ctx.fillText('click or press any key to try again', W / 2, H / 2 + 15);
      ctx.save(); ctx.translate(W / 2, H / 2 + 38); ctx.rotate(-0.02);
      ctx.fillText('(it probably wont go better)', 0, 0); ctx.restore();
      ctx.restore();
    }

    let lastTime = 0;
    function gameLoop(ts) {
      const dt = Math.min((ts - lastTime) / 1000, 0.05); lastTime = ts;
      ctx.clearRect(0, 0, W, H);
      drawPaper();

      if (!started) { drawTitle(); requestAnimationFrame(gameLoop); return; }
      if (!alive) { drawDead(); requestAnimationFrame(gameLoop); return; }

      // update
      if (keys['w'] || keys['ArrowUp'])    player.y -= player.speed * 60 * dt;
      if (keys['s'] || keys['ArrowDown'])  player.y += player.speed * 60 * dt;
      if (keys['a'] || keys['ArrowLeft'])  player.x -= player.speed * 60 * dt;
      if (keys['d'] || keys['ArrowRight']) player.x += player.speed * 60 * dt;
      player.x = Math.max(player.r, Math.min(W - player.r, player.x));
      player.y = Math.max(player.r, Math.min(H - player.r, player.y));
      player.angle = Math.atan2(my - player.y, mx - player.x);

      shootTimer -= dt;
      if (keys[' '] && shootTimer <= 0) { fireBullet(); shootTimer = 0.22; }

      if (!waveActive) {
        waveTimer -= 60 * dt;
        if (waveTimer <= 0) {
          wave++;
          enemiesToSpawn = 3 + wave * 2;
          waveActive = true; spawnTimer = 0;
          addFloat(`wave ${wave} coming i guess`, W / 2 - 90, H / 2 - 30, '#2c3e50');
        }
      } else {
        spawnTimer -= 60 * dt;
        if (spawnTimer <= 0 && enemiesToSpawn > 0) { spawnEnemy(); enemiesToSpawn--; spawnTimer = Math.max(15, 40 - wave * 2); }
        if (enemies.filter(e => e.alive).length === 0 && enemiesToSpawn === 0) {
          waveActive = false; waveTimer = 100;
          addFloat('nice!! break time', W / 2 - 60, H / 2 - 30, '#27ae60');
        }
      }

      enemies.forEach(e => {
        if (!e.alive) return;
        const dx = player.x - e.x, dy = player.y - e.y, len = Math.hypot(dx, dy) || 1;
        e.x += dx / len * e.speed * 60 * dt; e.y += dy / len * e.speed * 60 * dt;
        if (Math.hypot(dx, dy) < player.r + e.r) {
          player.hp--; spawnParticles(player.x, player.y, '#3498db', 8);
          e.alive = false;
          if (player.hp <= 0) alive = false;
        }
      });

      bullets.forEach(b => {
        if (!b.alive) return;
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) { b.alive = false; return; }
        enemies.forEach(e => {
          if (!e.alive || !b.alive) return;
          if (Math.hypot(b.x - e.x, b.y - e.y) < e.r + b.r) {
            b.alive = false; e.hp--;
            spawnParticles(e.x, e.y, e.col, 4);
            if (e.hp <= 0) { e.alive = false; score += e.pts; addFloat(MSGS[Math.floor(Math.random() * MSGS.length)], e.x - 15, e.y - 22, '#27ae60'); }
          }
        });
      });

      particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life -= dt * 1.5; return p.life > 0; });
      floats = floats.filter(f => { f.y -= 28 * dt; f.life -= dt; return f.life > 0; });
      bullets = bullets.filter(b => b.alive);
      enemies = enemies.filter(e => e.alive);

      // draw
      particles.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.life;
        wobblyFill(p.x, p.y, p.r, p.col, p.col); ctx.restore();
      });

      enemies.forEach(e => {
        wobblyFill(e.x, e.y, e.r, e.col + 'cc', e.col);
        ctx.font = '10px "Comic Sans MS",cursive'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.fillText(e.label, e.x, e.y + 3);
        const bw = e.r * 2;
        wobblyRect(e.x - bw / 2, e.y - e.r - 12, bw, 5, '#eee', '#aaa');
        wobblyRect(e.x - bw / 2, e.y - e.r - 12, bw * e.hp / e.maxHp, 5, '#e74c3c', '#c0392b');
      });

      bullets.forEach(b => {
        ctx.save();
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = '#2c3e50'; ctx.fill();
        ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 1; ctx.stroke();
        ctx.font = '8px "Comic Sans MS",cursive'; ctx.fillStyle = '#666'; ctx.textAlign = 'center';
        ctx.fillText('pew', b.x, b.y - 7);
        ctx.restore();
      });

      ctx.save();
      ctx.translate(player.x, player.y); ctx.rotate(player.angle);
      wobblyFill(0, 0, player.r, '#3498dbcc', '#2980b9');
      ctx.font = '9px "Comic Sans MS",cursive'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      ctx.fillText('u', 0, 3);
      ctx.restore();

      floats.forEach(f => {
        ctx.save(); ctx.globalAlpha = Math.min(1, f.life);
        ctx.font = 'bold 13px "Comic Sans MS",cursive'; ctx.fillStyle = f.col; ctx.textAlign = 'left';
        ctx.save(); ctx.translate(f.x, f.y); ctx.rotate((Math.random() - 0.5) * 0.05);
        ctx.fillText(f.txt, 0, 0); ctx.restore(); ctx.restore();
      });

      skewText(`score: ${score}`, 75, 20, 15, '#2c3e50', -0.02);
      skewText(`wave: ${wave || '(warming up)'}`, 75, 42, 15, '#8e44ad', -0.01);
      skewText('hp:', 75, 76, 11, '#555');
      for (let i = 0; i < player.maxHp; i++) {
        const col = i < player.hp ? '#e74c3c' : '#ddd';
        wobblyFill(75 + i * 22, 64, 8, col, col === '#e74c3c' ? '#c0392b' : '#bbb');
      }

      if (!waveActive && wave > 0) {
        const s = Math.ceil(waveTimer / 60);
        skewText(`next wave in ${s}s (get ready or whatever)`, W / 2 - 130, H - 12, 11, '#27ae60', 0.01);
      }

      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
  </script>
</body>
</html>
